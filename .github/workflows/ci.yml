name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    name: Dashboard (lint + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  ml-pipeline:
    name: ML Pipeline (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run ML tests
        run: python -m pytest tests/ -v --tb=short
